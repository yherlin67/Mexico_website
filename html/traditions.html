<script>
    const observer = new IntersectionObserver((entries) => { //entries = les élements observés à l'écran
    entries.forEach((entry) => {
        if (entry.isIntersecting) {
        entry.target.classList.add('active');
        }
    });
    }, {
    threshold: 0.1 // L'effet se déclenche quand 10% de l'élément est visible
    });

    // On cible tous les éléments avec la classe reveal
    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
</script>
